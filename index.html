<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ψ-NOTE — 臨床心理學筆記</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080B0F;--surface:#0E141B;--surface2:#141C26;--border:#1E2D3D;--text:#C8D8E8;--muted:#5A7A9A;--cyan:#2FE6CC;--magenta:#FF3D7A;--amber:#FFB454;--blue:#4DA8FF;--font:'Noto Sans TC',sans-serif;--mono:'JetBrains Mono',monospace}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.7}
  a{color:var(--cyan);text-decoration:none}
  header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(8,11,15,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;gap:20px;padding:0 24px}
  .brand{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
  .brand-mark{font-size:24px;font-weight:900;color:var(--cyan);font-family:var(--mono);text-shadow:0 0 20px var(--cyan)}
  .brand-text{font-size:14px;font-weight:700;color:var(--text)}
  .brand-text span{display:block;font-size:10px;color:var(--muted);letter-spacing:3px;font-family:var(--mono)}
  .search-bar{flex:1;max-width:400px;position:relative}
  .search-bar input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 14px 7px 34px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .2s}
  .search-bar input:focus{border-color:var(--cyan)}
  .search-bar input::placeholder{color:var(--muted)}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
  .top-nav{display:flex;gap:4px;margin-left:auto}
  .top-nav a{color:var(--muted);font-size:13px;padding:6px 12px;border-radius:5px;transition:all .2s;cursor:pointer}
  .top-nav a:hover,.top-nav a.active{color:var(--cyan);background:rgba(47,230,204,0.08)}
  .layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 60px);margin-top:60px}
  aside{position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;border-right:1px solid var(--border);padding:24px 16px}
  .sidebar-label{font-size:10px;letter-spacing:3px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;margin-bottom:10px;padding-left:4px}
  .cat-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;font-family:var(--font);border-radius:5px;text-align:left;transition:all .2s}
  .cat-btn:hover{color:var(--text);background:var(--surface2)}
  .cat-btn.active{color:var(--text);background:var(--surface2)}
  .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#5A7A9A}
  .cat-count{margin-left:auto;font-size:11px;font-family:var(--mono);color:var(--muted)}
  main{padding:32px 40px;max-width:860px}
  .page{display:none}.page.visible{display:block}
  .hero{margin-bottom:48px;padding-bottom:32px;border-bottom:1px solid var(--border)}
  .hero-eyebrow{font-size:11px;letter-spacing:4px;font-family:var(--mono);color:var(--cyan);margin-bottom:12px}
  .hero h1{font-size:32px;font-weight:900;color:white;line-height:1.3;margin-bottom:12px}
  .hero h1 em{color:var(--cyan);font-style:normal}
  .hero p{color:var(--muted);max-width:520px}
  .section-title{font-size:11px;letter-spacing:3px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;margin-bottom:20px}
  .cards{display:flex;flex-direction:column;gap:14px}
  .card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--card-color,var(--cyan));border-radius:8px;padding:18px 22px;cursor:pointer;transition:all .2s}
  .card:hover{background:var(--surface2);transform:translateX(3px)}
  .card-meta{display:flex;align-items:center;gap:12px;margin-bottom:7px}
  .card-cat{font-size:11px;font-family:var(--mono);letter-spacing:1px;color:var(--card-color,var(--cyan))}
  .card-date{font-size:11px;color:var(--muted);margin-left:auto}
  .card h2{font-size:16px;font-weight:700;color:white;margin-bottom:7px;line-height:1.4}
  .card p{font-size:13px;color:var(--muted);line-height:1.6}
  .card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
  .tag{font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:3px;background:rgba(47,230,204,0.07);border:1px solid rgba(47,230,204,0.18);color:var(--cyan)}
  .card-arrow{display:flex;justify-content:flex-end;margin-top:10px;font-size:12px;color:var(--muted);font-family:var(--mono)}
  .list-header{display:flex;align-items:center;gap:14px;margin-bottom:24px}
  .list-title{font-size:20px;font-weight:700;color:white}
  .result-count{font-size:12px;color:var(--muted);font-family:var(--mono)}
  .empty{text-align:center;padding:80px 20px;color:var(--muted)}
  .empty-icon{font-size:40px;margin-bottom:14px;opacity:.4}
  .empty h3{font-size:15px;color:var(--text);margin-bottom:6px}
  .article-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:28px;cursor:pointer;border:none;background:none;padding:0;transition:color .2s}
  .article-back:hover{color:var(--cyan)}
  .article-eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .article-cat-badge{font-size:11px;font-family:var(--mono);letter-spacing:1px;padding:3px 10px;border-radius:3px}
  .article-date{font-size:12px;color:var(--muted)}
  .article-title{font-size:26px;font-weight:900;color:white;line-height:1.3;margin-bottom:14px}
  .article-tags{display:flex;flex-wrap:wrap;gap:6px}
  .article-body{border-top:1px solid var(--border);padding-top:30px;margin-top:28px}
  .article-body h2{font-size:19px;font-weight:700;color:var(--cyan);margin:30px 0 11px;padding-left:12px;border-left:3px solid var(--cyan)}
  .article-body h3{font-size:15px;font-weight:700;color:white;margin:22px 0 9px}
  .article-body p{color:var(--text);margin-bottom:13px;line-height:1.8}
  .article-body ul,.article-body ol{padding-left:20px;margin-bottom:13px}
  .article-body li{color:var(--text);margin-bottom:5px;line-height:1.7}
  .article-body strong{color:white}
  .article-body em{color:var(--amber);font-style:normal}
  .article-body blockquote{border-left:3px solid var(--amber);padding:11px 16px;background:rgba(255,180,84,0.05);border-radius:0 6px 6px 0;margin:14px 0}
  .article-body code{font-family:var(--mono);font-size:13px;background:var(--surface2);padding:2px 6px;border-radius:3px;color:var(--cyan)}
  .article-body pre{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:16px;margin:14px 0;overflow-x:auto}
  .article-body pre code{background:none;padding:0;color:var(--text)}
  .article-body table{width:100%;border-collapse:collapse;margin:14px 0;font-size:14px}
  .article-body th{background:var(--surface2);color:var(--cyan);padding:9px 13px;text-align:left;border-bottom:2px solid var(--border);font-family:var(--mono);font-size:12px;letter-spacing:1px}
  .article-body td{padding:9px 13px;border-bottom:1px solid var(--border);color:var(--text)}
  .article-body tr:last-child td{border-bottom:none}
  .article-body tr:hover td{background:var(--surface2)}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  @media(max-width:700px){.layout{grid-template-columns:1fr}aside{display:none}main{padding:24px 16px}.hero h1{font-size:24px}}
</style>
</head>
<body>
<header>
  <div class="brand" onclick="navigate('home')">
    <span class="brand-mark">ψ</span>
    <div class="brand-text">臨床心理學筆記<span>PSI-NOTE</span></div>
  </div>
  <div class="search-bar">
    <span class="search-icon">⌕</span>
    <input id="searchInput" type="text" placeholder="搜尋筆記標題或標籤…" oninput="onSearch()">
  </div>
  <nav class="top-nav">
    <a id="nav-home" onclick="navigate('home')">首頁</a>
    <a id="nav-list" onclick="navigate('list')">所有筆記</a>
  </nav>
</header>
<div class="layout">
  <aside>
    <div class="sidebar-label">分類</div>
    <button class="cat-btn active" id="cat-all" onclick="filterCat('all')">
      <span class="cat-dot"></span>全部<span class="cat-count" id="count-all">0</span>
    </button>
    <div id="cat-list"></div>
  </aside>
  <main>
    <div class="page" id="page-home">
      <div class="hero">
        <div class="hero-eyebrow">CLINICAL PSYCHOLOGY NOTES</div>
        <h1>臨床心理學<em>學習筆記</em></h1>
        <p>整理研究所考科、國家考試、以及相關心理學知識的個人學習筆記庫。</p>
      </div>
      <div class="section-title">最新筆記</div>
      <div class="cards" id="home-cards"></div>
    </div>
    <div class="page" id="page-list">
      <div class="list-header">
        <div class="list-title">所有筆記</div>
        <div class="result-count" id="result-count"></div>
      </div>
      <div class="cards" id="list-cards"></div>
      <div class="empty" id="list-empty" style="display:none">
        <div class="empty-icon">🔍</div>
        <h3>找不到相關筆記</h3>
        <p>試試其他關鍵字，或清除篩選條件</p>
      </div>
    </div>
    <div class="page" id="page-article">
      <button class="article-back" id="back-btn">← 返回</button>
      <div class="article-eyebrow">
        <span class="article-cat-badge" id="a-cat"></span>
        <span class="article-date" id="a-date"></span>
      </div>
      <h1 class="article-title" id="a-title"></h1>
      <div class="article-tags" id="a-tags"></div>
      <div class="article-body" id="a-body"></div>
    </div>
  </main>
</div>
<script>
const COLORS={'研究所考科':'#2FE6CC','國考科目':'#FF3D7A','其他心理學':'#FFB454','讀書心得':'#4DA8FF'};
let articles=[],currentCat='all',currentSearch='',prevPage='home',currentPage='home';
async function init(){
  try{const d=await fetch('./articles.json').then(r=>r.json());articles=(d.articles||[]).sort((a,b)=>new Date(b.date)-new Date(a.date));buildSidebar(d.categories||[]);}
  catch(e){articles=[];buildSidebar([]);}
  document.getElementById('back-btn').onclick=()=>navigate(prevPage);
  route();window.addEventListener('hashchange',route);
}
function route(){const h=window.location.hash||'#home';if(h.startsWith('#article/'))showArticle(h.slice(9));else if(h==='#list')showPage('list');else showPage('home');}
function navigate(p){window.location.hash='#'+p;}
function showPage(page){
  prevPage=currentPage;currentPage=page;
  document.querySelectorAll('.top-nav a').forEach(a=>a.classList.remove('active'));
  const n=document.getElementById('nav-'+page);if(n)n.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('visible'));
  document.getElementById('page-'+page).classList.add('visible');
  if(page==='home')renderHome();if(page==='list')renderList();
}
function showArticle(id){
  const a=articles.find(x=>x.id===id);if(!a){navigate('list');return;}
  prevPage=currentPage;currentPage='article';
  document.querySelectorAll('.top-nav a').forEach(a=>a.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('visible'));
  document.getElementById('page-article').classList.add('visible');
  const c=COLORS[a.category]||'#2FE6CC';
  const cat=document.getElementById('a-cat');
  cat.textContent=a.category;cat.style.cssText='color:'+c+';border:1px solid '+c+'44;background:'+c+'18;';
  document.getElementById('a-date').textContent=fmtDate(a.date);
  document.getElementById('a-title').textContent=a.title;
  document.getElementById('a-body').innerHTML=a.content;
  document.getElementById('a-tags').innerHTML=(a.tags||[]).map(t=>'<span class="tag">'+t+'</span>').join('');
  window.scrollTo(0,0);
}
function buildSidebar(cats){
  document.getElementById('count-all').textContent=articles.length;
  document.getElementById('cat-list').innerHTML=cats.map(cat=>{
    const c=COLORS[cat]||'#5A7A9A',n=articles.filter(a=>a.category===cat).length;
    return `<button class="cat-btn" id="cb-${eid(cat)}" onclick="filterCat('${cat}')"><span class="cat-dot" style="background:${c}"></span>${cat}<span class="cat-count">${n}</span></button>`;
  }).join('');
}
function filterCat(cat){
  currentCat=cat;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById(cat==='all'?'cat-all':'cb-'+eid(cat));if(btn)btn.classList.add('active');
  navigate('list');
}
function onSearch(){currentSearch=document.getElementById('searchInput').value.toLowerCase().trim();navigate('list');}
function getFiltered(){
  return articles.filter(a=>{
    const mc=currentCat==='all'||a.category===currentCat;
    const mq=!currentSearch||a.title.toLowerCase().includes(currentSearch)||(a.summary||'').toLowerCase().includes(currentSearch)||(a.tags||[]).some(t=>t.toLowerCase().includes(currentSearch));
    return mc&&mq;
  });
}
function renderHome(){document.getElementById('home-cards').innerHTML=articles.slice(0,5).map(cardHTML).join('');}
function renderList(){
  const f=getFiltered();
  document.getElementById('result-count').textContent=f.length+' 篇';
  document.getElementById('list-empty').style.display=f.length?'none':'block';
  document.getElementById('list-cards').innerHTML=f.map(cardHTML).join('');
}
function cardHTML(a){
  const c=COLORS[a.category]||'#2FE6CC';
  const tags=(a.tags||[]).map(t=>'<span class="tag">'+t+'</span>').join('');
  return '<div class="card" style="--card-color:'+c+'" onclick="window.location.hash=\'#article/'+a.id+'\'">'+
    '<div class="card-meta"><span class="card-cat">'+a.category+'</span><span class="card-date">'+fmtDate(a.date)+'</span></div>'+
    '<h2>'+a.title+'</h2><p>'+(a.summary||'')+'</p>'+
    (tags?'<div class="card-tags">'+tags+'</div>':'')+
    '<div class="card-arrow">閱讀全文 →</div></div>';
}
function fmtDate(s){if(!s)return'';const d=new Date(s);return d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0');}
function eid(s){return s.replace(/\s+/g,'_');}
init();
</script>
</body>
</html>
